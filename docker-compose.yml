services:
  db:
    image: postgis/postgis:16-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=geosnap_db
      - POSTGRES_USER=geosnap_user
      - POSTGRES_PASSWORD=geosnap_pass
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://geosnap_user:geosnap_pass@db:5432/geosnap_db
    depends_on:
      - db

volumes:
  postgres_data: