{% extends "base.html" %}

{% block title %}Registration - GeoSnap{% endblock %}

{% block content %}
    <h2>Create account</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-fields">
            {{ form.as_p }}
        </div>
        <button type="submit">Signup</button>
    </form>
    
    <div class="auth-footer">
        You have an account? <a href="{% url 'login' %}">Login here!</a>
    </div>
{% endblock %}
